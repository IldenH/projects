<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anime</title>
    <script src="index.js" type="module" defer></script>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <h1 id="username"></h1>
    <section>
      Logget inn som&nbsp;
      <div class="select-wrapper"><select id="users"></select></div>
    </section>

    <h2>Dine anbefalinger</h2>
    <section id="recommendations"></section>

    <h2>Finn serier</h2>
    <section class="search-section">
      <label class="search">
        <span>Søk etter en serie:</span>
        <input
          type="text"
          id="search"
          placeholder="F.eks. One Piece, Naruto..."
        />
      </label>
      <ul id="results"></ul>
    </section>

    <h2>Du har sett på</h2>
    <form class="watched" id="watched"></form>
  </body>
</html>
