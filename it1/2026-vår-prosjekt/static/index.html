<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anime</title>
    <script src="index.js" type="module" defer></script>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <header>
      <h1 id="username"></h1>
      <section aria-label="Brukervalg">
        <label for="users">Velg bruker</label>
        <div class="select-wrapper">
          <select id="users"></select>
        </div>
      </section>
    </header>

    <main>
      <section aria-labelledby="rec-heading">
        <h2 id="rec-heading">Dine anbefalinger</h2>
        <section
          id="recommendations"
          aria-live="polite"
          aria-atomic="true"
        ></section>
      </section>

      <section aria-labelledby="search-heading">
        <h2 id="search-heading">Finn serier</h2>
        <section class="search-section">
          <label class="search">
            <span>Søk etter en serie:</span>
            <input
              type="text"
              id="search"
              placeholder="F.eks. One Piece, Naruto..."
              aria-describedby="search-help"
            />
          </label>
          <p id="search-help">Skriv for å søke i anime-databasen</p>
          <ul
            id="results"
            aria-live="polite"
            aria-relevant="additions removals"
          ></ul>
        </section>
      </section>

      <h2>Du har sett på</h2>
      <ul class="watched" id="watched" aria-label="Sett anime"></ul>
    </main>
  </body>
</html>
